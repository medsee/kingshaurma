<!DOCTYPE html>

<head>

  <title>Menyu | King Shaurma Samarqand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header" id="header">
    <nav class="nav container">
      <a href="index.html" class="nav__logo">
        <span class="logo-crown">♛</span>
        <span class="logo-text">King <strong>SHAURMA</strong></span>
      </a>
      <ul class="nav__menu" id="navMenu">
        <li><a href="index.html" class="nav__link">Bosh sahifa</a></li>
        <li><a href="menu.html" class="nav__link active">Menyu</a></li>
        <li><a href="order.html" class="nav__link">Buyurtma</a></li>
        <li><a href="track.html" class="nav__link">Kuzatish</a></li>
        <li><a href="contact.html" class="nav__link">Aloqa</a></li>
      </ul>
      <div class="nav__actions">
        <a href="order.html" class="nav__cart">
          <i class="fas fa-shopping-basket"></i>
          <span class="cart-badge" id="cartBadge">0</span>
        </a>
        <button class="nav__toggle" id="navToggle" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>
  </header>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <div class="container">
      <h1 class="page-hero__title">Bizning <span class="text-gold">Menyu</span></h1>
      <p class="page-hero__sub">Eng mazali taomlarni tanlang va buyurtma qiling</p>
    </div>
  </div>

  <!-- MENU SECTION -->
  <section class="menu-page section">
    <div class="container">

      <!-- Search & Filter -->
      <div class="menu-controls">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="menuSearch" placeholder="Taom qidirish..." class="search-input" />
        </div>
        <div class="category-tabs" id="categoryTabs">
          <button class="cat-tab active" data-cat="all">
            <span>🍽️</span> Barchasi
          </button>
          <button class="cat-tab" data-cat="shaurma">
            <span>🌯</span> Shaurma
          </button>
          <button class="cat-tab" data-cat="pizza">
            <span>🍕</span> Pizza
          </button>
          <button class="cat-tab" data-cat="burger">
            <span>🍔</span> Burger
          </button>
          <button class="cat-tab" data-cat="drink">
            <span>🥤</span> Ichimliklar
          </button>
        </div>
      </div>

      <!-- Menu Grid -->
      <div class="menu__grid" id="menuGrid">
        <!-- Items rendered by JS -->
      </div>

      <!-- Empty state -->
      <div class="menu__empty hidden" id="menuEmpty">
        <div class="empty-icon">🔍</div>
        <h3>Hech narsa topilmadi</h3>
        <p>Boshqa kalit so'z bilan qidiring</p>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer__bottom" style="justify-content:center;">
        <p>© 2025 King Shaurma | <a href="tel:+998939921111">(93) 992 11 11</a> | Dahbet 16, Samarqand</p>
      </div>
    </div>
  </footer>

  <button class="scroll-top" id="scrollTop"><i class="fas fa-chevron-up"></i></button>
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
